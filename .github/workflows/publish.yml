name: Publish to npm

on:
    push:
        tags:
            - 'v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            - run: npm ci

            - run: npm run build

            - run: npm publish --access public --provenance

            - name: Get previous tag
              id: prev_tag
              run: |
                  CURRENT_TAG=${{ github.ref_name }}
                  PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)
                  if [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
                    PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
                    echo "diff_url=${{ github.server_url }}/${{ github.repository }}/compare/${PREV_TAG:0:7}...${CURRENT_TAG}" >> $GITHUB_OUTPUT
                  else
                    echo "diff_url=${{ github.server_url }}/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}" >> $GITHUB_OUTPUT
                  fi

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create ${{ github.ref_name }} \
                    --title "${{ github.ref_name }}" \
                    --generate-notes \
                    --notes "**Full Changelog**: ${{ steps.prev_tag.outputs.diff_url }}"
